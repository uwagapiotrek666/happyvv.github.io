<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzień Kobiet 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
            --text-dark: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
            z-index: 10;
        }

        .heart-icon {
            color: var(--primary-pink);
            font-size: 2.5rem;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 30%, 100% { transform: scale(1); }
            15% { transform: scale(1.2); }
        }

        .btn {
            background: linear-gradient(to right, var(--primary-pink), var(--secondary-pink));
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.05); }

        #youtube-player {
            position: absolute;
            top: -9999px;
            left: -9999px;
            visibility: hidden;
        }

        .surprise-text {
            display: none;
            margin-top: 2rem;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--secondary-pink);
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .heart-particle { position: absolute; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="youtube-player"></div>

    <div class="card">
        <i class="fas fa-heart heart-icon"></i>
        <h1 style="color: var(--primary-pink); margin: 1rem 0;">Dla Ciebie</h1>
        <p id="instruction" style="margin-bottom: 2rem;">Przygotowałem coś specjalnego...</p>

        <button class="btn" id="action-btn" onclick="startExperience()">Otwórz Życzenia 🎵</button>
        
        <div id="surprise" class="surprise-text">
            Bo jesteś zajebista! ✨🌷
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const VIDEO_ID = 'KNF_-EtCQR4'; 
        const START_SECOND = 47;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: VIDEO_ID,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'start': START_SECOND // Ustawienie startu w parametrach
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(100);
        }

        function startExperience() {
            if (player && player.playVideo) {
                player.seekTo(START_SECOND, true);
                player.playVideo();
            }

            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('instruction').style.display = 'none';
            document.getElementById('surprise').style.display = 'block';

            createHearts();
        }

        function createHearts() {
            for (let i = 0; i < 40; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.transition = `transform ${Math.random() * 3 + 2}s linear, opacity 2s`;
                
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.style.transform = `translateY(-110vh) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                }, 50);

                setTimeout(() => heart.remove(), 5000);
            }
        }
    </script>
</body>
</html>
