<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzień Kobiet 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
            --bg-soft: #fff5f7;
            --text-dark: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .heart-icon {
            color: var(--primary-pink);
            font-size: 2.5rem;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 30%, 60%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            45% { transform: scale(1.15); }
        }

        .btn {
            background: linear-gradient(to right, var(--primary-pink), var(--secondary-pink));
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-3px); }

        .surprise-text {
            display: none;
            margin-top: 2rem;
            font-size: 1.3rem;
            color: var(--secondary-pink);
            animation: fadeIn 1s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .heart-particle { position: absolute; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div class="card">
        <i class="fas fa-heart heart-icon"></i>
        <h1 style="margin: 1rem 0; color: var(--primary-pink);">Dla Ciebie</h1>
        <p id="wish-text" style="margin-bottom: 2rem;">Kliknij poniżej, aby usłyszeć coś specjalnego...</p>

        <button class="btn" id="action-btn" onclick="celebrate()">Otwórz Życzenia 🎵</button>
        
        <div id="surprise" class="surprise-text">
            Bo jesteś zajebista! ✨🌷
        </div>
    </div>

    <script>
        function celebrate() {
            const btn = document.getElementById('action-btn');
            const surprise = document.getElementById('surprise');
            const wishText = document.getElementById('wish-text');

            // 1. Odtwarzanie muzyki
            // UWAGA: Musisz wkleić tutaj poprawny link do pliku MP3
            const audioUrl = "LINK_DO_TWOJEGO_PLIKU_MP3.mp3"; 
            const audio = new Audio(audioUrl);
            audio.play().catch(error => console.log("Błąd odtwarzania: " + error));

            // 2. Efekty wizualne
            btn.style.display = 'none';
            surprise.style.display = 'block';
            wishText.innerHTML = "Wszystkiego najlepszego z okazji Dnia Kobiet!";

            createParticles();
        }

        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.transition = `transform ${Math.random() * 3 + 2}s linear, opacity 2s`;
                
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.style.transform = `translateY(-110vh) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                }, 50);

                setTimeout(() => heart.remove(), 4000);
            }
        }
    </script>
</body>
</html>
