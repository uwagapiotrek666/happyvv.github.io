<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C:</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
            --text-dark: #4a4a4a;
            --soft-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        /* Stylizacja karty życzeń */
        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 90%;
            max-width: 450px;
            padding: 3.5rem 2.5rem;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
            z-index: 10;
            border: 2px solid var(--soft-white);
            backdrop-filter: blur(10px);
        }

        .heart-icon {
            color: var(--primary-pink);
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: heartbeat 1.5s infinite ease-in-out;
        }

        @keyframes heartbeat {
            0%, 30%, 100% { transform: scale(1); }
            15% { transform: scale(1.25); }
        }

        h1 {
            color: var(--primary-pink);
            font-size: 2.2rem;
            margin: 1rem 0;
            font-weight: 700;
        }

        p {
            color: var(--text-dark);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn {
            background: linear-gradient(to right, var(--primary-pink), var(--secondary-pink));
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(255, 117, 140, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 117, 140, 0.5);
        }

        #youtube-player {
            position: absolute;
            top: -9999px;
            left: -9999px;
            visibility: hidden;
        }

        /* Tekst niespodzianki */
        .surprise-text {
            display: none;
            margin-top: 2.5rem;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--secondary-pink);
            animation: fadeInScale 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            filter: drop-shadow(0 0 5px rgba(255,100,100,0.3));
        }
    </style>
</head>
<body>

    <div id="youtube-player"></div>

    <main class="card">
        <header>
            <i class="fas fa-heart heart-icon"></i>
            <h1>Dla Ciebie</h1>
        </header>
        
        <p id="instruction">Wszystkiego najlepszego z okazji Dnia Kobiet! <br> Przygotowałem dla Ciebie coś specjalnego...</p>

        <button class="btn" id="action-btn" onclick="startExperience()">
            Otwórz Życzenia 🎵
        </button>
        
        <div id="surprise" class="surprise-text">
            Bo jesteś zajebista! ✨🌷
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const VIDEO_ID = 'KNF_-EtCQR4'; 
        const START_SECOND = 47;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: VIDEO_ID,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'start': START_SECOND,
                    'modestbranding': 1,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(100);
        }

        function startExperience() {
            if (player && player.playVideo) {
                player.seekTo(START_SECOND, true);
                player.playVideo();
            }

           
            const btn = document.getElementById('action-btn');
            const instr = document.getElementById('instruction');
            const surprise = document.getElementById('surprise');

            btn.style.display = 'none';
            instr.style.opacity = '0.6';
            surprise.style.display = 'block';

         
            createHearts();
            setTimeout(createHearts, 1500);
        }

        function createHearts() {
            const container = document.body;
            for (let i = 0; i < 45; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = i % 2 === 0 ? '❤️' : '🌸';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 25 + 15) + 'px';
                
                const duration = Math.random() * 3 + 3;
                heart.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-in`;
                
                container.appendChild(heart);

                setTimeout(() => {
                    const xOffset = (Math.random() - 0.5) * 200; // Rozrzut boczny
                    heart.style.transform = `translate(${xOffset}px, -115vh) rotate(${Math.random() * 720}deg)`;
                    heart.style.opacity = '0';
                }, 50);

                setTimeout(() => heart.remove(), duration * 1000);
            }
        }
    </script>
</body>
</html>
